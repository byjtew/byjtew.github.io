name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-site:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          SITE_NAME: ${{ vars.SITE_NAME }}
          SITE_HANDLE: ${{ vars.SITE_HANDLE }}
          SITE_BIO: ${{ vars.SITE_BIO }}
          SITE_URL: ${{ vars.SITE_URL }}
          SITE_TITLE: ${{ vars.SITE_TITLE }}
          SITE_DESCRIPTION: ${{ vars.SITE_DESCRIPTION }}
          SOCIAL_GITHUB_URL: ${{ vars.SOCIAL_GITHUB_URL }}
          SOCIAL_LINKEDIN_URL: ${{ vars.SOCIAL_LINKEDIN_URL }}
          SOCIAL_EMAIL_URL: ${{ vars.SOCIAL_EMAIL_URL }}
          PROJECTS_JSON: ${{ secrets.PROJECTS_JSON != '' && secrets.PROJECTS_JSON || vars.PROJECTS_JSON }}

      - name: Upload main site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: ./_site
          if-no-files-found: error

  build-osm-house-to-street:
    runs-on: ubuntu-latest

    steps:
      - name: Clone osm_house_to_street
        run: git clone --depth 1 --single-branch https://github.com/byjtew/osm_house_to_street.git source

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: source/webapp/package-lock.json

      - name: Install and build osm_house_to_street
        working-directory: source/webapp
        run: npm ci && npm run build

      - name: Upload osm_house_to_street artifact
        uses: actions/upload-artifact@v4
        with:
          name: house-to-street-build
          path: source/webapp/dist
          if-no-files-found: error

  package:
    runs-on: ubuntu-latest
    needs:
      - build-site
      - build-osm-house-to-street

    steps:
      - name: Download main site artifact
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: _site

      - name: Download osm_house_to_street artifact
        uses: actions/download-artifact@v4
        with:
          name: house-to-street-build
          path: house_to_street_dist

      - name: Assemble final Pages output
        run: |
          set -euo pipefail

          if [ -f house_to_street_dist/index.html ]; then
            SOURCE_DIR="house_to_street_dist"
          elif [ -f house_to_street_dist/dist/index.html ]; then
            SOURCE_DIR="house_to_street_dist/dist"
          else
            echo "Could not find house_to_street build index.html in downloaded artifact"
            echo "Artifact tree:"
            find house_to_street_dist -maxdepth 3 -print
            exit 1
          fi

          mkdir -p _site/house_to_street
          cp -R "$SOURCE_DIR"/. _site/house_to_street/

          if [ ! -f _site/house_to_street/index.html ]; then
            echo "Packaging failed: _site/house_to_street/index.html is missing"
            exit 1
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    runs-on: ubuntu-latest
    needs: package
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
