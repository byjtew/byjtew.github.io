projects:
  - title: "SBB for Komoot"
    subtitle: "Bridging SBB with Komoot for lazy hikers."
    summary: "Browser extension adding SBB/CFF/FFS (Swiss Federal Railways) route planning to Komoot, published for both Firefox and Chrome."
    highlights:
      - 'Developed with <a href="https://github.com/Aloha-Churchill" target="_blank" rel="noreferrer">Aloha Churchill</a> for our shared hikes'
      - "Built using extensions.js for cross-browser compatibility"
      - "Published on both Firefox Add-ons and Chrome Web Store"
    links:
      repo: "https://github.com/sbb-for-komoot/sbb-for-komoot"
      firefox_addon: "https://addons.mozilla.org/firefox/addon/sbb-for-komoot/"
      chrome_addon: "https://chromewebstore.google.com/detail/sbb-for-komoot/iefcphjnomeehmcigelkbhmemcdegmjl"
    image:
      url: "sbb_for_komoot_screenshot.png"
      alt: "SBB for Komoot browser extension screenshot"

  - title: "OSM - House to street proximity"
    subtitle: "Interactive house-street proximity explorer, using OpenStreetMap data and PMTiles."
    summary: "Geo-spatial visualisation tool that computes how close each houses wall is to nearby roads from OSM data, then renders multi-zoom PMTiles layers in a fast static web page."
    links:
      repo: "https://github.com/byjtew/osm_house_to_street"
      demo: "https://byjtew.github.io/house_to_street"
    image:
      url: "osm_house_to_street_denver_viridis.webp"
      alt: "OSM house-to-street interactive map"
      gif: "osm_house_to_street_animated.gif"
 
